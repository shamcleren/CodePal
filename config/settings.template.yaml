version: 1
locale: system
display:
  showInStatusBar: true
  hiddenAgents: []
  density: detailed
history:
  persistenceEnabled: true
  retentionDays: 2
  maxStorageMb: 100
providerGateway:
  enabled: true
  host: 127.0.0.1
  port: 15721
  activeProvider: mimo
  providers:
    mimo:
      type: anthropic-compatible
      displayName: MiMo Gateway
      baseUrl: https://token-plan-cn.xiaomimimo.com/anthropic
      authScheme: bearer
      tokenRef: mimo.gateway.token
      envFallback: MIMO_GATEWAY_TOKEN
      headers: {}
      modelMappings:
        anthropic/MiMo-V2.5-Pro: mimo-v2.5-pro
        anthropic/MiMo-V2.5: mimo-v2.5
        anthropic/MiMo-V2-Pro: mimo-v2-pro
        anthropic/MiMo-V2-Omni: mimo-v2-omni
codebuddy:
  code:
    enabled: true
    label: CodeBuddy Code
    loginUrl: https://tencent.sso.codebuddy.cn/profile/usage
    quotaEndpoint: https://tencent.sso.codebuddy.cn/billing/meter/get-enterprise-user-usage
    cookieNames:
      - RIO_TOKEN
      - RIO_TOKEN_HTTPS
      - P_RIO_TOKEN
      - BK_TICKET
      - tof_auth
      - keycloak_session
      - x_host_key_access
      - x_host_key_access_https
      - x-tofapi-host-key
  enterprise:
    enabled: false
    label: CodeBuddy Enterprise
    loginUrl: ""
    quotaEndpoint: ""
    cookieNames:
      - RIO_TOKEN
      - RIO_TOKEN_HTTPS
      - P_RIO_TOKEN
      - BK_TICKET
      - tof_auth
      - keycloak_session
      - x_host_key_access
      - x_host_key_access_https
      - x-tofapi-host-key
